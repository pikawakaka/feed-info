<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Builders 动态 - Follow Builders</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #1d9bf0;
      --bg: #f7f9f9;
      --bg-card: #ffffff;
      --text: #0f1419;
      --text-muted: #536471;
      --border: #eff3f4;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Noto Sans SC', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }

    .container { max-width: 800px; margin: 0 auto; padding: 0 1rem; }

    .header {
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
      padding: 1rem 0;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-content {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .logo { display: flex; align-items: center; gap: 0.5rem; font-weight: 700; font-size: 1.25rem; }
    .logo-icon { font-size: 1.5rem; }
    .meta { font-size: 0.875rem; color: var(--text-muted); }

    .controls { display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap; }

    .stats {
      display: flex;
      gap: 2rem;
      padding: 1rem 0;
      border-bottom: 1px solid var(--border);
      margin-bottom: 1rem;
    }

    .stat { text-align: center; }
    .stat-value { font-size: 1.5rem; font-weight: 700; color: var(--primary); }
    .stat-label { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; }

    .builder-section { margin-bottom: 2rem; }

    .builder-header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 1rem;
      background: var(--bg-card);
      border-radius: 12px 12px 0 0;
      border: 1px solid var(--border);
      border-bottom: none;
    }

    .builder-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), #0a8cd8);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 700;
      font-size: 1.25rem;
    }

    .builder-info { flex: 1; }
    .builder-name { font-weight: 600; font-size: 1rem; }
    .builder-handle { color: var(--text-muted); font-size: 0.875rem; }
    .builder-bio { font-size: 0.8rem; color: var(--text-muted); margin-top: 0.25rem; }

    .tweets-container { background: var(--bg-card); border: 1px solid var(--border); border-radius: 0 0 12px 12px; }

    .tweet {
      padding: 1rem;
      border-bottom: 1px solid var(--border);
      transition: background 0.2s;
    }

    .tweet:last-child { border-bottom: none; border-radius: 0 0 12px 12px; }
    .tweet:hover { background: #f7f9f9; }

    .tweet-content { font-size: 0.95rem; line-height: 1.6; white-space: pre-wrap; word-break: break-word; }
    .tweet-translation { 
      font-size: 0.9rem; 
      line-height: 1.6; 
      color: #16a34a; 
      margin-top: 0.5rem;
      padding: 0.75rem;
      background: #f0fdf4;
      border-radius: 8px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .tweet-link {
      color: var(--primary);
      text-decoration: none;
      display: inline-block;
      font-size: 0.85rem;
      margin-top: 0.5rem;
    }

    .tweet-link:hover { text-decoration: underline; }

    .tweet-meta { display: flex; gap: 1rem; margin-top: 0.5rem; font-size: 0.8rem; color: var(--text-muted); }
    .tweet-stats { display: flex; gap: 1rem; margin-top: 0.25rem; }
    .tweet-stat { display: flex; align-items: center; gap: 0.25rem; font-size: 0.8rem; color: var(--text-muted); }

    .quote-indicator {
      background: var(--bg);
      border-left: 3px solid var(--primary);
      padding: 0.75rem;
      margin-top: 0.5rem;
      border-radius: 0 8px 8px 0;
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    .footer { text-align: center; padding: 2rem; color: var(--text-muted); font-size: 0.875rem; }
    .footer a { color: var(--primary); text-decoration: none; }
    .footer a:hover { text-decoration: underline; }

    .loading { text-align: center; padding: 3rem; color: var(--text-muted); }
    .error { text-align: center; padding: 3rem; color: #ef4444; }
    .no-tweets { text-align: center; padding: 2rem; color: var(--text-muted); }

    @media (max-width: 640px) {
      .stats { justify-content: center; }
      .builder-header { flex-direction: column; text-align: center; }
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="container header-content">
      <div class="logo"><span class="logo-icon">🚀</span><span>Follow Builders</span></div>
      <div class="meta" id="metaInfo">加载中...</div>
    </div>
  </header>

  <main class="container">
    <div class="stats">
      <div class="stat"><div class="stat-value" id="builderCount">-</div><div class="stat-label">开发者</div></div>
      <div class="stat"><div class="stat-value" id="tweetCount">-</div><div class="stat-label">推文</div></div>
      <div class="stat"><div class="stat-value" id="hoursCount">-</div><div class="stat-label">小时</div></div>
    </div>
    <div id="content"></div>
  </main>

  <footer class="footer">
    <p>数据来源 <a href="https://github.com/zarazhangrui/follow-builders" target="_blank">follow-builders</a></p>
    <p>更新时间: <span id="generatedAt"></span></p>
  </footer>

  <script>
    let feedData = null;

    async function loadFeed() {
      const content = document.getElementById('content');
      content.innerHTML = '<div class="loading">正在加载动态...</div>';
      
      try {
        const response = await fetch('https://raw.githubusercontent.com/zarazhangrui/follow-builders/main/feed-x.json');
        if (!response.ok) throw new Error('获取数据失败');
        
        feedData = await response.json();
        await translateAndRender();
      } catch (error) {
        content.innerHTML = `<div class="error">错误: ${error.message}<br>请刷新页面重试</div>`;
      }
    }

    async function translateAndRender() {
      document.getElementById('metaInfo').textContent = `${feedData.lookbackHours}小时回顾 (翻译中...)`;
      document.getElementById('builderCount').textContent = feedData.x.length;
      document.getElementById('hoursCount').textContent = feedData.lookbackHours;
      
      const content = document.getElementById('content');
      let totalTweets = 0;
      let hasAnyTweet = false;
      
      for (let i = 0; i < feedData.x.length; i++) {
        const builder = feedData.x[i];
        if (!builder.tweets || builder.tweets.length === 0) continue;
        
        hasAnyTweet = true;
        totalTweets += builder.tweets.length;
        
        const section = document.createElement('div');
        section.className = 'builder-section';
        
        const initial = builder.name.charAt(0).toUpperCase();
        
        let tweetsHtml = '';
        for (let j = 0; j < builder.tweets.length; j++) {
          const tweet = builder.tweets[j];
          const time = new Date(tweet.createdAt).toLocaleString('zh-CN', {
            month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit'
          });
          
          const translated = await translateText(tweet.text);
          
          let quoteHtml = '';
          if (tweet.isQuote && tweet.parentText) {
            quoteHtml = `<div class="quote-indicator">${escapeHtml(tweet.parentText)}</div>`;
          }
          
          tweetsHtml += `
            <div class="tweet">
              <div class="tweet-content">${escapeHtml(tweet.text)}</div>
              <div class="tweet-translation">${escapeHtml(translated)}</div>
              ${quoteHtml}
              <a href="${tweet.url}" target="_blank" class="tweet-link">
                ${tweet.isQuote ? '🔄 查看原文' : '🐦 查看推文'} →
              </a>
              <div class="tweet-stats">
                <span class="tweet-stat">❤️ ${tweet.likes}</span>
                <span class="tweet-stat">🔁 ${tweet.retweets}</span>
                <span class="tweet-stat">💬 ${tweet.replies}</span>
              </div>
              <div class="tweet-meta">${time}</div>
            </div>
          `;
        }
        
        section.innerHTML = `
          <div class="builder-header">
            <div class="builder-avatar">${initial}</div>
            <div class="builder-info">
              <div class="builder-name">${escapeHtml(builder.name)}</div>
              <div class="builder-handle">@${escapeHtml(builder.handle)}</div>
              <div class="builder-bio">${escapeHtml(builder.bio)}</div>
            </div>
          </div>
          <div class="tweets-container">${tweetsHtml}</div>
        `;
        
        content.appendChild(section);
      }
      
      if (!hasAnyTweet) {
        content.innerHTML = '<div class="no-tweets">暂无推文数据</div>';
      }
      
      document.getElementById('tweetCount').textContent = totalTweets;
      document.getElementById('metaInfo').textContent = `${feedData.lookbackHours}小时回顾`;
      
      const genTime = new Date(feedData.generatedAt).toLocaleString('zh-CN', {
        year: 'numeric', month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit'
      });
      document.getElementById('generatedAt').textContent = genTime;
    }

    async function translateText(text) {
      if (!text) return '';
      
      const apis = [
        async () => {
          const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=zh-CN&dt=t&q=${encodeURIComponent(text)}`;
          const response = await fetch(url, { signal: AbortSignal.timeout(3000) });
          const data = await response.json();
          if (data && data[0]) {
            const translated = data[0].map(item => item[0]).join('');
            if (translated) return translated;
          }
          throw new Error('Google failed');
        },
        async () => {
          const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=en|zh`;
          const response = await fetch(url, { signal: AbortSignal.timeout(3000) });
          const data = await response.json();
          if (data.responseStatus === 200 && data.responseData) {
            return data.responseData.translatedText;
          }
          throw new Error('MyMemory failed');
        }
      ];
      
      for (const api of apis) {
        try {
          return await api();
        } catch (e) {
          continue;
        }
      }
      return text;
    }

    function escapeHtml(text) {
      if (!text) return '';
      return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    loadFeed();
  </script>
</body>
</html>
